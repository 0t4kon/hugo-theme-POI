{{ define "main" }}
<!-- 标签页面样式 -->
<style>
.tags-cloud { 
  display: flex; 
  flex-wrap: wrap; 
  gap: 1rem; 
  margin: 2rem 0;
}
.tag-item {
  padding: 0.5rem 1rem;
  background: #f7fafc;
  border-radius: 20px;
  text-decoration: none;
  color: #4a5568;
}
.tag-item:hover { background: #e2e8f0; }
.tag-count { color: #718096; margin-left: 0.3rem; }
.tag-posts { margin: 3rem 0; }
</style>

<main class="content">
  <h1>所有标签</h1>
  
  <!-- 标签云 -->
  <div class="tags-cloud">
    {{ range .Site.Taxonomies.tags.ByCount }}
    <div class="tag-item">
      {{ .Page.Title }} <span class="tag-count">({{ .Count }})</span>
    </div>
    {{ end }}
  </div>

  <!-- 每个标签下的文章列表 -->
  {{ range .Site.Taxonomies.tags }}
  <div class="tag-posts">
    <h2># {{ .Page.Title }}</h2>
    <ul>
      {{ range .Pages }}
      <li><a href="{{ .Permalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  </div>
  {{ end }}
</main>
{{ end }}
