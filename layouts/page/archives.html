{{ define "main" }}
<!-- 归档页面样式（直接内嵌，无需改外部CSS） -->
<style>
.archives-year { margin: 3rem 0 1rem; font-size: 1.5rem; color: #2d3748; }
.archives-list { list-style: none; padding: 0; }
.archives-item { 
  padding: 0.8rem 0; 
  border-bottom: 1px solid #eee; 
  display: flex; 
  gap: 1.5rem;
}
.archives-date { color: #718096; min-width: 6rem; }
.archives-title a { color: #2d3748; text-decoration: none; }
.archives-title a:hover { color: #3182ce; }
</style>

<main class="content">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  <!-- 按年份分组所有文章 -->
  {{ range .Site.RegularPages.GroupByDate "2006" }}
  <h2 class="archives-year">{{ .Key }} 年</h2>
  <ul class="archives-list">
    {{ range .Pages }}
    <li class="archives-item">
      <span class="archives-date">{{ .Date.Format "01-02" }}</span>
      <span class="archives-title"><a href="{{ .Permalink }}">{{ .Title }}</a></span>
    </li>
    {{ end }}
  </ul>
  {{ end }}
</main>
{{ end }}
